name: CICD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

concurrency:
  group: self-hosted-runner
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REF_REPO: thuannan/aio2025-mlops-project01
  DOCKER_BUILDKIT: 1
  FEAST_REPO_PATH: data-pipeline/churn_feature_store/churn_features/feature_repo
  TRAINING_REPO_PATH: model_pipeline
  SERVING_REPO_PATH: serving_pipeline

jobs:
  feast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: 3.9

      - name: Test activate conda environment
        shell: bash -l {0}
        run: |
          conda create -y -n churn_mlops python=3.9
          conda activate churn_mlops
          cd data-pipeline
          pip install -r requirements.txt
          pip install feast

      - name: Apply Feast Feature Definitions
        shell: bash -l {0}
        working-directory: ${{ env.FEAST_REPO_PATH }}
        run: |
          conda activate churn_mlops
          feast apply

      - name: Materialize Feast Features
        shell: bash -l {0}
        working-directory: ${{ env.FEAST_REPO_PATH }}
        run: |
          conda activate churn_mlops
          feast materialize-incremental $(date -u +"%Y-%m-%dT%H:%M:%S")


  training:
    runs-on: ubuntu-latest
    needs: feast
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: 3.9

      - name: Test activate conda environment
        shell: bash -l {0}
        run: |
          conda create -y -n mlops_2026 python=3.9
          conda activate mlops_2026
          cd model_pipeline
          pip install -r requirements.txt

      - name: Run Training
        shell: bash -l {0}
        working-directory: ${{ env.TRAINING_REPO_PATH }}
        run: |
          conda activate mlops_2026
          bash ./src/run_sh/train.sh | tee train.log
          RUN_ID=$(grep -oE 'runs/[a-f0-9]+' train.log | head -n1 | cut -d/ -f2)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "MODEL_URI=runs:${RUN_ID}/xgboost_churn" >> $GITHUB_ENV

      - name: Debug RUN_ID
        run: echo "The RUN_ID is ${{ env.RUN_ID }}"

      - name: Run Evaluation
        shell: bash -l {0}
        working-directory: ${{ env.TRAINING_REPO_PATH }}
        run: |
          conda activate mlops_2026
          bash ./src/run_sh/eval.sh --run-id ${{ env.RUN_ID }} | tee eval.log

      - name: Run Registration
        shell: bash -l {0}
        working-directory: ${{ env.TRAINING_REPO_PATH }}
        run: |
          conda activate mlops_2026
          bash ./src/run_sh/register.sh --run-id ${{ env.RUN_ID }} | tee register.log

      - name: Update Model Version Alias
        shell: bash -l {0}
        working-directory: ${{ env.TRAINING_REPO_PATH }}
        run: |
          conda activate mlops_2026
          bash ./src/run_sh/set_model_alias.sh

      - name: Promote to Champion
        shell: bash -l {0}
        working-directory: ${{ env.TRAINING_REPO_PATH }}
        run: |
          conda activate mlops_2026
          bash ./src/run_sh/promote.sh

  serving: 
    runs-on: ubuntu-latest
    needs: training
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REF_REPO }}
          tags: |
            # Tag for main branch
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag with commit SHA
            type=sha,prefix={{branch}}-

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVING_REPO_PATH }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REF_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REF_REPO }}:buildcache,mode=max

      - name: Start API Service
        shell: bash
        working-directory: ${{ env.SERVING_REPO_PATH }}
        run: |
          docker compose up -d --force-recreate
        
